services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: akita_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PHP-FPM ───────────────────────────────────────────────────────────────────
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: akita_php
    restart: unless-stopped
    env_file: .env
    environment:
      # Переопределяем для работы внутри Docker-сети
      DB_HOST: postgres
      DB_PORT: "5432"
      MINIO_ENDPOINT: minio
    volumes:
      - ./api:/var/www/api
    depends_on:
      postgres:
        condition: service_healthy

  # ── Nginx (API gateway) ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: akita_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./api:/var/www/api
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  # ── Vue / Vite (dev-сервер) ───────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: akita_frontend
    restart: unless-stopped
    working_dir: /app
    env_file: .env
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - nginx

  # ── MinIO (S3-совместимое хранилище) ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: akita_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # Web-консоль (SSH-туннель для доступа извне)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5


volumes:
  postgres_data:
  minio_data:
  frontend_node_modules:
